<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Warga Pande</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        /* Background khas Warga Pande: Nuansa Merah Api & Gelap yang Elegan */
        .bg-pande {
            background-image: url('https://images.unsplash.com/photo-1537996194471-e657df975ab4?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-pande min-h-screen flex items-center justify-center p-4 antialiased">

    <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-2xl p-8 max-w-lg w-full border border-red-200/20">
        
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-red-800 tracking-wide uppercase">Pendaftaran Warga Pande</h2>
            <p class="text-gray-600 text-sm mt-1">Lengkapi data diri Anda untuk mengakses dashboard</p>
            <div class="h-1 w-20 bg-red-600 mx-auto mt-3 rounded-full"></div>
        </div>

        <form id="registrationForm" class="space-y-4">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Lengkap</label>
                <input type="text" id="nama" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition" placeholder="Contoh: I Wayan Pande">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Alamat/Banjar</label>
                <input type="text" id="alamat" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition" placeholder="Contoh: Jl. Pande Besi No. 10">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Kabupaten</label>
                    <select id="kabupaten" required style="width: 250px" class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition">
                        <option value="">Pilih Kabupaten</option>
                        <option value="Badung">Badung</option>
                        <option value="Bangli">Bangli</option>
                        <option value="Buleleng">Buleleng</option>
                        <option value="Gianyar">Gianyar</option>
                        <option value="Jembrana">Jembrana</option>
                        <option value="Karangasem">Karangasem</option>
                        <option value="Klungkung">Klungkung</option>
                        <option value="Tabanan">Tabanan</option>
                        <option value="Denpasar">Denpasar</option>
                    </select>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mt-4">
                <div>
                    <label for="kecamatan" class="block text-sm font-semibold text-gray-700 mb-1">Kecamatan</label>
                    <select id="kecamatan" required disabled style="width: 280px" class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition">
                        <option value="">-- Pilih Kabupaten Dahulu --</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">No. WhatsApp (Aktif)</label>
                <div class="flex flex-wrap gap-2">
                    <input type="tel" id="notelp" required style="width: 240px" class="flex flex-wrap px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition" placeholder="081234567xxx">
                    <button type="button" id="btnOtp" onclick="sendOTP()" class="bg-red-700 hover:bg-red-800 text-white font-medium px-4 py-2 rounded-lg transition text-sm cursor-pointer whitespace-nowrap">
                        Kirim OTP
                    </button>
                </div>
                <p id="otpStatus" class="text-xs mt-1 text-gray-500"></p>
            </div>

            <div id="otpContainer" class="hidden transition-all duration-300">
                <label class="block text-sm font-semibold text-red-700 mb-1">Masukkan Kode OTP</label>
                <input type="text" id="otpInput" maxlength="6" class="w-full px-4 py-2 border border-red-300 bg-red-50 rounded-lg focus:ring-2 focus:ring-red-500 text-center font-bold tracking-widest text-lg outline-none" placeholder="******">
            </div>

            <button type="submit" id="btnDaftar" class="w-full mt-2 bg-gradient-to-r from-red-700 to-amber-700 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:from-red-800 hover:to-amber-800 transition transform active:scale-95 cursor-pointer">
                DAFTAR SEKARANG
            </button>
        </form>
    </div>

    <script>
        const btnkirim = document.getElementById('btnDaftar');
        const nama = document.getElementById('nama');
        
        btnkirim.disabled = true;
        btnkirim.className = "w-full mt-2 bg-gradient-to-r from-red-700 to-amber-700 text-white font-bold py-3 px-4 rounded-lg shadow-md opacity-50 cursor-not-allowed dynamic-none";
        
        // Data Kecamatan berdasarkan Kabupaten
        const dataWilayah = {
            "Badung": ["Mengwi", "Kuta", "Kuta Utara", "Kuta Selatan", "Abiansemal", "Petang"],
            "Bangli": ["Bangli", "Kintamani", "Susut", "Tembuku"],
            "Buleleng": ["Singaraja", "Banjar", "Busungbiu", "Gerokgak", "Kubutambahan", "Sawan", "Seririt", "Sukasada", "Tejakula"],
            "Gianyar": ["Gianyar", "Blahbatuh", "Sukawati", "Ubud", "Tampaksiring", "Tegallalang", "Payangan"],
            "Karangasem": ["Karangasem", "Abang", "Bebandem", "Manggis", "Rendang", "Sidemen", "Selat", "Kubu"],
            "Klungkung": ["Klungkung", "Banjarangkan", "Dawan", "Nusa Penida"],
            "Jembrana": ["Negara", "Mendoyo", "Pekutatan", "Melaya", "Jembrana"],
            "Tabanan": ["Tabanan", "Kediri", "Kerambitan", "Marga", "Penebel", "Pupuan", "Selemadeg", "Selemadeg Barat", "Selemadeg Timur", "Baturiti"],
            "Denpasar": ["Denpasar Barat", "Denpasar Timur", "Denpasar Selatan", "Denpasar Utara"]
        };

        const kabupatenSelect = document.getElementById('kabupaten');
        const kecamatanSelect = document.getElementById('kecamatan');

        // Handle Perubahan Dropdown Kabupaten -> Mengisi Dropdown Kecamatan
        kabupatenSelect.addEventListener('change', function() {
            const kabupatenTerpilih = this.value;
            
            kecamatanSelect.innerHTML = '<option value="">-- Pilih Kecamatan --</option>';
            
            if (kabupatenTerpilih && dataWilayah[kabupatenTerpilih]) {
                kecamatanSelect.disabled = false;
                dataWilayah[kabupatenTerpilih].forEach(function(kec) {
                    const option = document.createElement('option');
                    option.value = kec;
                    option.textContent = kec;
                    kecamatanSelect.appendChild(option);
                });
            } else {
                kecamatanSelect.disabled = true;
                kecamatanSelect.innerHTML = '<option value="">-- Pilih Kabupaten Dahulu --</option>';
            }
        });
        
        // --- KONFIGURASI JALUR AMBIL DATA ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6jl4kaMN9ptunSoByzws8XCGyflwaTMvmKUMhjVV_BvS7-OFD9EeL-6k3kTDTAmK9Uw/exec"; 

        let TWILIO_ACCOUNT_SID = "AC66a9f4de5796a1d66013a22b581633bd"; 
        let TWILIO_AUTH_TOKEN = "5db0c320590cf17e4146cdc35e16a86b";
        const TWILIO_WHATSAPP_NUMBER = "+14155238886"; 

        let generatedOTP = null;

        // Fungsi otomatis untuk mengambil kredensial dari Google Sheets
        

        // Jalankan fungsi saat halaman selesai dimuat (Gabungan fungsi tunggal)
        window.onload = function() {
          //  muatKredensialDariSheets();

            const savedSession = localStorage.getItem('wargaPandeSession');
            if (savedSession) {
                console.log("Sesi ditemukan, langsung masuk dashboard.");
                renderDashboard(JSON.parse(savedSession));
            }
        };

        // --- FUNGSI KIRIM OTP VIA TWILIO ---
        async function sendOTP() {
            const noTelp = document.getElementById('notelp').value;
            const btnOtp = document.getElementById('btnOtp');
            const otpStatus = document.getElementById('otpStatus');
            const namaUser = nama.value || "Semeton Pande";

            if (!TWILIO_ACCOUNT_SID || !TWILIO_AUTH_TOKEN) {
                alert("Sistem sedang menyiapkan koneksi aman, silakan tunggu 2 detik lalu coba lagi.");
                return;
            }

            if (!noTelp) {
                alert("Silakan masukkan nomor telepon terlebih dahulu!");
                return;
            }

            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            
            btnOtp.disabled = true;
            btnOtp.innerText = "Mengirim...";
            otpStatus.innerText = "Sedang mengirim kode OTP via Twilio...";

            let formattedPhone = noTelp.trim();
            if(formattedPhone.startsWith("0")) {
                formattedPhone = "+62" + formattedPhone.slice(1);
            } else if(!formattedPhone.startsWith("+")) {
                formattedPhone = "+" + formattedPhone;
            }

            const dataKirim = new URLSearchParams();
            dataKirim.append('To', `whatsapp:${formattedPhone}`);
            dataKirim.append('From', `whatsapp:${TWILIO_WHATSAPP_NUMBER}`);
            dataKirim.append('Body', `[Selamat datang ${namaUser}] Kode OTP pendaftaran Anda adalah: ${generatedOTP}. Jaga kerahasiaan kode ini.`);

            try {
                const credentialBase64 = btoa(`${TWILIO_ACCOUNT_SID}:${TWILIO_AUTH_TOKEN}`);

                const response = await fetch(`https://api.twilio.com/2010-04-01/Accounts/${TWILIO_ACCOUNT_SID}/Messages.json`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Basic ${credentialBase64}`,
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: dataKirim
                });

                const jsonResult = await response.json();

                if (response.ok) {
                    otpStatus.className = "text-xs mt-1 text-green-600 font-medium";
                    otpStatus.innerText = "OTP berhasil dikirim ke WhatsApp via Twilio!";
                    document.getElementById('otpContainer').classList.remove('hidden');
                    
                    btnkirim.disabled = false;
                    btnkirim.className = "w-full mt-2 bg-gradient-to-r from-red-700 to-amber-700 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:from-red-800 hover:to-amber-800 transition transform active:scale-95 cursor-pointer";
                } else {
                    throw new Error(jsonResult.message || "Ditolak oleh Twilio");
                }
            } catch (error) {
                console.error("Detail Error:", error);
                otpStatus.className = "text-xs mt-1 text-amber-600 font-medium";
                otpStatus.innerText = `Gagal mengirim via Twilio. Simulasi OTP Anda: ${generatedOTP}`;
                document.getElementById('otpContainer').classList.remove('hidden');
                
                btnkirim.disabled = false;
                btnkirim.className = "w-full mt-2 bg-gradient-to-r from-red-700 to-amber-700 text-white font-bold py-3 px-4 rounded-lg shadow-md";
            } finally {
                btnOtp.disabled = false;
                btnOtp.innerText = "Kirim Ulang";
            }
        }

        // --- 2. LOGIKA SUBMIT FORM (SIMPAN DATA & VALIDASI) ---
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const inputOtp = document.getElementById('otpInput').value;

            if (!generatedOTP) {
                alert("Silakan klik 'Kirim OTP' terlebih dahulu!");
                return;
            }
            if (inputOtp !== generatedOTP) {
                alert("Kode OTP salah! Periksa kembali WhatsApp Anda.");
                return;
            }

            const dataPendaftar = {
                nama: document.getElementById('nama').value,
                alamat: document.getElementById('alamat').value,
                kabupaten: document.getElementById('kabupaten').value,
                kecamatan: document.getElementById('kecamatan').value,
                no_telp: document.getElementById('notelp').value,
                waktu_daftar: new Date().toISOString()
            };

            localStorage.setItem('wargaPandeSession', JSON.stringify(dataPendaftar));

            // Catatan: Pastikan SUPABASE_URL dan SUPABASE_KEY sudah didefinisikan jika Anda menggunakan segmen ini
            try {
                if (typeof SUPABASE_URL !== 'undefined' && typeof SUPABASE_KEY !== 'undefined') {
                    const supabaseResponse = await fetch(`${SUPABASE_URL}/rest/v1/warga_pande`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify(dataPendaftar)
                    });

                    if (!supabaseResponse.ok) {
                        throw new Error("Gagal sync ke database Supabase");
                    }
                }
            } catch (err) {
                console.warn("Supabase Error: ", err.message);
            }

            alert("Pendaftaran Berhasil! Membuka Dashboard...");
            renderDashboard(dataPendaftar);
        });

        // --- 3. RENDER DASHBOARD BARU SECARA DINAMIS ---
        function renderDashboard(data) {
            const body = document.body;
            body.innerHTML = `
                <div class="max-w-4xl w-full mx-auto p-6 bg-slate-900 text-white rounded-2xl shadow-2xl border border-red-500/30">
                    <div class="flex justify-between items-center border-b border-gray-700 pb-4 mb-6">
                        <div>
                            <h1 class="text-3xl font-bold text-red-500 tracking-wider">YOWANA WARGA PANDE</h1>
                            <p class="text-sm text-gray-400">Selamat Datang kembali, Semeton!</p>
                        </div>
                        <button onclick="localStorage.removeItem('wargaPandeSession'); location.reload();" class="bg-red-600 hover:bg-red-700 text-white text-xs px-4 py-2 rounded-lg font-medium transition cursor-pointer">
                            Keluar / Logout
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-slate-800 p-6 rounded-xl border border-gray-700 md:col-span-1">
                            <div class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center text-3xl font-bold mx-auto mb-4 border-2 border-amber-400 shadow-md">
                                ${data.nama.charAt(0).toUpperCase()}
                            </div>
                            <h3 class="text-center font-semibold text-lg text-amber-400">${data.nama}</h3>
                            <p class="text-center text-xs text-gray-400 mt-1">${data.no_telp}</p>
                        </div>

                        <div class="bg-slate-800 p-6 rounded-xl border border-gray-700 md:col-span-2">
                            <h4 class="text-md font-bold text-gray-300 uppercase tracking-wider mb-4 border-b border-gray-700 pb-2">Informasi Akun Anda</h4>
                            <table class="w-full text-sm text-left text-gray-300">
                                <tr class="border-b border-gray-700/50">
                                    <td class="py-3 font-semibold text-gray-400 w-1/3">Alamat</td>
                                    <td class="py-3">: ${data.alamat}</td>
                                </tr>
                                <tr class="border-b border-gray-700/50">
                                    <td class="py-3 font-semibold text-gray-400">Kecamatan</td>
                                    <td class="py-3">: ${data.kecamatan}</td>
                                </tr>
                                <tr class="border-b border-gray-700/50">
                                    <td class="py-3 font-semibold text-gray-400">Kabupaten</td>
                                    <td class="py-3">: ${data.kabupaten}</td>
                                </tr>
                                <tr>
                                    <td class="py-3 font-semibold text-gray-400">Status Akun</td>
                                    <td class="py-3">: <span class="bg-green-900/50 text-green-400 border border-green-500/30 px-2 py-0.5 rounded text-xs font-bold">TERVERIFIKASI (OTP)</span></td>
                                </tr>
                            </table>
                        </div>
                    </div>
                    <div style="display: flex; justify-content: center;" class="mt-4">
                        <button onclick="location.href='gemini-code-1780021093318.html'" class="bg-red-600 hover:bg-red-700 text-white text-xs px-4 py-2 rounded-lg font-medium transition cursor-pointer">
                            Dashboard Utama
                        </button>
                    </div>
                    <div class="mt-6 p-4 bg-amber-950/20 border border-amber-500/20 rounded-xl text-xs text-amber-200/80">
                        <strong>Sistem Info:</strong> Data Anda telah terenkripsi dan disimpan dengan aman secara lokal di perangkat Anda.
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
